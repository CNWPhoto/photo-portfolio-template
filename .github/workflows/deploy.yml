name: Deploy

# Branch-promoted client deploys.
#
# ──────────────────────────────────────────────────────────────────────
#                          push to `main`
#                                │
#                                ▼
#                     Demo (cnw-photo-demo) ─── canary
#                                │  (must succeed before clients run)
#                                ▼
#                         (stop — clients not touched)
#
#                          push to `production`
#                                │
#                                ▼
#                     Demo (cnw-photo-demo) ─── canary again
#                                │  (must succeed)
#                                ▼
#                     Fan-out to every client in matrix
# ──────────────────────────────────────────────────────────────────────
#
# Client deploys ONLY happen when something is explicitly merged into
# `production`. `main` is for iteration and demo validation. Typical
# release flow:
#
#     # work on main
#     git push origin main                  # demo rebuilds + smoke tested
#     # verify demo looks right
#     git checkout production
#     git merge main
#     git push origin production            # demo + all clients rebuild
#
# If a release goes bad:
#
#     git revert HEAD
#     git push origin production            # clients redeploy previous good state
#
# Or for one-off fast recovery: CF dashboard → client project →
# Deployments → previous → "Rollback to this deployment". See
# docs/emergency-playbook.md.
#
# ──────────────────────────────────────────────────────────────────────
# Secrets model — per GitHub Environment
# ──────────────────────────────────────────────────────────────────────
# Environments (Settings → Environments in the template repo):
#
#   demo                        ← cnw-photo-demo.<acct>.workers.dev
#     CF_API_TOKEN              CF token using "Edit Cloudflare Workers" template
#     CF_ACCOUNT_ID             numeric account ID
#     SANITY_API_READ_TOKEN     read token for hx5xgigp
#     SANITY_PREVIEW_SECRET     32-byte hex preview secret
#
#   client-coola-creative       ← coolacreative.com (custom domain)
#     CF_API_TOKEN              CF token scoped to Carla's account (Workers template)
#     CF_ACCOUNT_ID             Carla's CF account ID
#     SANITY_API_READ_TOKEN     read token for tl3zj8iz
#     SANITY_PREVIEW_SECRET     32-byte hex preview secret
#
# Adding a client: create a new environment `client-<slug>` with the 4
# secrets above, then add a matrix entry below.
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, production]
  workflow_dispatch:
    inputs:
      only_client:
        description: 'Cut over ONLY this client slug to Workers (blank = normal demo behavior). Used for staged per-client cutover without a production fan-out.'
        required: false
        default: ''

env:
  NODE_VERSION: '22'

jobs:
  # ════════════════════════════════════════════════════════════════════
  # 1. Demo (canary) — runs on every push to main or production.
  #    Client job is gated on this succeeding.
  # ════════════════════════════════════════════════════════════════════
  demo:
    name: Demo (canary)
    # Skip the demo redeploy when a single-client cutover is dispatched.
    if: github.event_name != 'workflow_dispatch' || inputs.only_client == ''
    runs-on: ubuntu-latest
    environment: demo
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Unit tests gate the whole pipeline: the client jobs `needs: demo`, so
      # a failing test here blocks the fan-out to every client.
      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: hx5xgigp
          PUBLIC_SANITY_DATASET: production
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
          SANITY_PREVIEW_SECRET: ${{ secrets.SANITY_PREVIEW_SECRET }}
          SANITY_STUDIO_URL: https://cnw-photo-demo.sanity.studio

      # Workers deploy (Astro 6 / @astrojs/cloudflare v13). Pattern proven
      # 2026-05-19. Secrets pushed in their own step with explicit --name;
      # deploy runs from repo root so the adapter's .wrangler/deploy
      # redirect resolves main/assets; --name supplies the worker name.
      - name: Upload Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
          SANITY_PREVIEW_SECRET: ${{ secrets.SANITY_PREVIEW_SECRET }}
        run: |
          node -e "const fs=require('fs');fs.writeFileSync('/tmp/secrets.json',JSON.stringify({SANITY_API_READ_TOKEN:process.env.SANITY_API_READ_TOKEN,SANITY_PREVIEW_SECRET:process.env.SANITY_PREVIEW_SECRET,SANITY_STUDIO_URL:'https://cnw-photo-demo.sanity.studio'}))"
          npx wrangler secret bulk /tmp/secrets.json --name cnw-photo-demo
          rm -f /tmp/secrets.json

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name cnw-photo-demo

      - name: Smoke test
        run: |
          URL="${{ steps.deploy.outputs.deployment-url }}"
          echo "Demo Worker URL: ${URL}"
          if [ -z "$URL" ]; then echo "::error::no deployment-url output from wrangler"; exit 1; fi
          sleep 10
          STATUS=$(curl -sI -o /dev/null -w "%{http_code}" "${URL}/")
          BODY=$(curl -sL "${URL}/")
          BODY_LEN=${#BODY}
          echo "Status: ${STATUS}  Body length: ${BODY_LEN} bytes"
          if [ "$STATUS" != "200" ]; then echo "::error::Smoke failed — HTTP $STATUS"; exit 1; fi
          if [ "$BODY_LEN" -lt 5000 ]; then echo "::error::Smoke failed — body $BODY_LEN bytes"; exit 1; fi
          if ! echo "$BODY" | grep -qi '<title>'; then echo "::error::Smoke failed — no <title>"; exit 1; fi
          RC=$(curl -sI -o /dev/null -w "%{http_code}" "${URL}/portfolio")
          echo "trailing-slash: /portfolio -> ${RC} (expect 308)"
          echo "✓ Demo Workers smoke passed: ${URL}"

  # ════════════════════════════════════════════════════════════════════
  # 2. Clients — only on push to `production`, and only if demo passed.
  #    fail-fast is OFF: one client's failure doesn't block the rest
  #    (they're independent sites).
  # ════════════════════════════════════════════════════════════════════
  clients:
    name: Client — ${{ matrix.client.slug }}
    if: github.ref == 'refs/heads/production'
    needs: demo
    runs-on: ubuntu-latest
    environment: client-${{ matrix.client.slug }}
    strategy:
      fail-fast: false
      matrix:
        client:
          - slug: karen-conrad-photography
            sanity_project_id: hydwn002
            studio_url: https://karen-conrad-photography.sanity.studio
          - slug: kelly-mac-studios
            sanity_project_id: qva1dysl
            studio_url: https://kelly-mac-studios.sanity.studio
          - slug: blackbird-photography
            sanity_project_id: 6nc24jar
            studio_url: https://blackbird-photography.sanity.studio
          - slug: coola-creative
            sanity_project_id: tl3zj8iz
            studio_url: https://coola-creative.sanity.studio
          - slug: family-demo
            sanity_project_id: v14sne67
            studio_url: https://family-demo.sanity.studio
          - slug: lavon-photography
            sanity_project_id: 3a8494gh
            studio_url: https://lavon-photography.sanity.studio
          # Add new clients here. Each slug must match the GitHub
          # Environment name pattern `client-<slug>`. studio_url is the
          # hosted Studio URL on sanity.studio (drives SANITY_STUDIO_URL
          # at build time for stega). The Worker public URL doesn't need
          # to live here — it's derived from the slug at deploy time.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for ${{ matrix.client.slug }}
        run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: ${{ matrix.client.sanity_project_id }}
          PUBLIC_SANITY_DATASET: production
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
          SANITY_PREVIEW_SECRET: ${{ secrets.SANITY_PREVIEW_SECRET }}
          SANITY_STUDIO_URL: ${{ matrix.client.studio_url }}

      # Workers deploy — same proven pattern as the demo job, templated
      # per client by slug. Requires the client-<slug> environment's
      # CF_API_TOKEN to be re-scoped to the "Edit Cloudflare Workers"
      # permission set (Pages-scoped tokens fail at secret/deploy).
      - name: Upload Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
          SANITY_PREVIEW_SECRET: ${{ secrets.SANITY_PREVIEW_SECRET }}
          STUDIO_URL: ${{ matrix.client.studio_url }}
        run: |
          node -e "const fs=require('fs');fs.writeFileSync('/tmp/secrets.json',JSON.stringify({SANITY_API_READ_TOKEN:process.env.SANITY_API_READ_TOKEN,SANITY_PREVIEW_SECRET:process.env.SANITY_PREVIEW_SECRET,SANITY_STUDIO_URL:process.env.STUDIO_URL}))"
          npx wrangler secret bulk /tmp/secrets.json --name ${{ matrix.client.slug }}
          rm -f /tmp/secrets.json

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name ${{ matrix.client.slug }}

      - name: Smoke test
        run: |
          URL="${{ steps.deploy.outputs.deployment-url }}"
          echo "Smoke testing ${{ matrix.client.slug }}: ${URL}"
          if [ -z "$URL" ]; then echo "::error::${{ matrix.client.slug }} — no deployment-url"; exit 1; fi
          sleep 10
          STATUS=$(curl -sI -o /dev/null -w "%{http_code}" "${URL}/")
          BODY=$(curl -sL "${URL}/")
          BODY_LEN=${#BODY}
          echo "Status: $STATUS  Body length: $BODY_LEN bytes"
          if [ "$STATUS" != "200" ]; then echo "::error::${{ matrix.client.slug }} — HTTP $STATUS"; exit 1; fi
          if [ "$BODY_LEN" -lt 5000 ]; then echo "::error::${{ matrix.client.slug }} — body $BODY_LEN bytes"; exit 1; fi
          if ! echo "$BODY" | grep -qi '<title>'; then echo "::error::${{ matrix.client.slug }} — no <title>"; exit 1; fi
          echo "✓ Smoke test passed for ${{ matrix.client.slug }}: ${URL}"

  # ════════════════════════════════════════════════════════════════════
  # 3. Single-client cutover — manual (workflow_dispatch w/ only_client).
  #    Deploys ONE client to Workers without a production fan-out, for
  #    staged migration + per-client redeploys. NOTE: slug→config is
  #    duplicated from the clients matrix here; consolidating both to a
  #    shared client registry is the top scaling follow-up.
  # ════════════════════════════════════════════════════════════════════
  client-one:
    name: Cutover — ${{ inputs.only_client }}
    if: github.event_name == 'workflow_dispatch' && inputs.only_client != ''
    runs-on: ubuntu-latest
    environment: client-${{ inputs.only_client }}
    steps:
      - name: Resolve client config
        id: cfg
        run: |
          case "${{ inputs.only_client }}" in
            kelly-mac-studios) PID=qva1dysl; STU=https://kelly-mac-studios.sanity.studio;;
            blackbird-photography) PID=6nc24jar; STU=https://blackbird-photography.sanity.studio;;
            coola-creative) PID=tl3zj8iz; STU=https://coola-creative.sanity.studio;;
            family-demo) PID=v14sne67; STU=https://family-demo.sanity.studio;;
            lavon-photography) PID=3a8494gh; STU=https://lavon-photography.sanity.studio;;
            karen-conrad-photography) PID=hydwn002; STU=https://karen-conrad-photography.sanity.studio;;
            *) echo "::error::unknown client '${{ inputs.only_client }}'"; exit 1;;
          esac
          echo "pid=$PID" >> "$GITHUB_OUTPUT"
          echo "stu=$STU" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: ${{ steps.cfg.outputs.pid }}
          PUBLIC_SANITY_DATASET: production
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
          SANITY_PREVIEW_SECRET: ${{ secrets.SANITY_PREVIEW_SECRET }}
          SANITY_STUDIO_URL: ${{ steps.cfg.outputs.stu }}

      - name: Upload Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
          SANITY_PREVIEW_SECRET: ${{ secrets.SANITY_PREVIEW_SECRET }}
          STUDIO_URL: ${{ steps.cfg.outputs.stu }}
        run: |
          node -e "const fs=require('fs');fs.writeFileSync('/tmp/secrets.json',JSON.stringify({SANITY_API_READ_TOKEN:process.env.SANITY_API_READ_TOKEN,SANITY_PREVIEW_SECRET:process.env.SANITY_PREVIEW_SECRET,SANITY_STUDIO_URL:process.env.STUDIO_URL}))"
          npx wrangler secret bulk /tmp/secrets.json --name ${{ inputs.only_client }}
          rm -f /tmp/secrets.json

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name ${{ inputs.only_client }}

      - name: Smoke test
        run: |
          URL="${{ steps.deploy.outputs.deployment-url }}"
          echo "Cutover ${{ inputs.only_client }}: ${URL}"
          if [ -z "$URL" ]; then echo "::error::no deployment-url"; exit 1; fi
          sleep 10
          STATUS=$(curl -sI -o /dev/null -w "%{http_code}" "${URL}/")
          BODY=$(curl -sL "${URL}/"); BODY_LEN=${#BODY}
          echo "Status: $STATUS  Body length: $BODY_LEN bytes"
          if [ "$STATUS" != "200" ]; then echo "::error::${{ inputs.only_client }} — HTTP $STATUS"; exit 1; fi
          if [ "$BODY_LEN" -lt 5000 ]; then echo "::error::${{ inputs.only_client }} — body $BODY_LEN bytes"; exit 1; fi
          if ! echo "$BODY" | grep -qi '<title>'; then echo "::error::${{ inputs.only_client }} — no <title>"; exit 1; fi
          echo "✓ ${{ inputs.only_client }} Workers smoke passed: ${URL}"
